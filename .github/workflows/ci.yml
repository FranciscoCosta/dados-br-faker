name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Cache the pnpm store with a per-node-version key. Using setup-node's
      # built-in `cache: pnpm` shares one key across the matrix, which can race
      # when parallel jobs restore/save it concurrently.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-node${{ matrix.node }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-node${{ matrix.node }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build
