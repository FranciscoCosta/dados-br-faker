name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    # Exposes whether the publish token is configured, so the job stays green
    # until the NPM_TOKEN secret is added.
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Skip notice
        if: env.HAS_NPM_TOKEN != 'true'
        run: echo "NPM_TOKEN secret not set — skipping release. Add it in repo Settings › Secrets › Actions to enable publishing."

      # Opens a "Version Packages" PR when changesets exist; publishes to npm
      # when that PR is merged (i.e. when the version in package.json is new).
      - name: Create Release PR or publish
        if: env.HAS_NPM_TOKEN == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
